name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Install JuliaFormatter
        run: julia -e 'using Pkg; Pkg.add("JuliaFormatter")'
      - name: Check formatting
        run: |
          julia -e '
          using JuliaFormatter
          formatted = format(".", verbose=true)
          if formatted
            @error "Code is not formatted. Run `julia -e \"using JuliaFormatter; format(\\\".\\\")\"`"
            exit(1)
          end
          '
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # Single GC thread — the Pkg.test subprocess inherits this and avoids the intermittent
      # Julia 1.12 parallel-GC sweep-race SIGSEGV that otherwise crashes the heavy suite.
      JULIA_NUM_GC_THREADS: "1"
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - name: Load Julia packages from cache
        id: julia-cache
        uses: julia-actions/cache@v2
      - name: Refresh registry
        # julia-actions/cache can restore a ~/.julia/registries snapshot that predates a
        # just-published dependency (e.g. a fresh Tachikoma release), making resolve fail
        # until the cache expires. Force the registry current.
        run: julia -e 'using Pkg; Pkg.Registry.update()'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - name: Save Julia depot cache on cancel or failure
        id: julia-cache-save
        if: cancelled() || failure()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ steps.julia-cache.outputs.cache-paths }}
          key: ${{ steps.julia-cache.outputs.cache-key }}

  # The gate lives in the lightweight KaimonGate subpackage (lib/KaimonGate).
  # Test it standalone so it stays installable on its own (ZMQ + stdlib only).
  test-kaimongate:
    name: KaimonGate (lib) - Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      JULIA_NUM_GC_THREADS: "1"   # same parallel-GC-segfault mitigation as the Kaimon suite
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - name: Test KaimonGate (standalone)
        run: julia --project=lib/KaimonGate -e 'using Pkg; Pkg.test()'